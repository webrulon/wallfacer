name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...
        working-directory: .

      - name: Test
        run: go test -v -race ./...
        working-directory: .

      - name: Coverage (Go)
        run: |
          go test -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | awk '/^total:/{gsub("%","",$3); print $3}')
          echo "total=${total}" >> "$GITHUB_OUTPUT"
        id: coverage
        working-directory: .

      - name: Coverage Summary
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Overall Go coverage: **${{ steps.coverage.outputs.total }}%**" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Profile
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

      - name: Update Coverage Badge JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .github/badges
          total="${{ steps.coverage.outputs.total }}"
          color="red"
          awk "BEGIN {exit !($total >= 80)}" && color="brightgreen" || true
          awk "BEGIN {exit !($total >= 65 && $total < 80)}" && color="yellow" || true
          awk "BEGIN {exit !($total >= 50 && $total < 65)}" && color="orange" || true
          cat > .github/badges/coverage.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${total}%",
            "color": "${color}"
          }
          EOF

      - name: Commit Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "No coverage badge changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -m "ci: update coverage badge [skip ci]"
          git push
