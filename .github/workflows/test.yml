name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: .

      - name: Vet
        run: go vet ./...
        working-directory: .

      - name: Test
        run: go test -v -race ./...
        working-directory: .

      - name: Coverage (Go)
        run: |
          go test -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | awk '/^total:/{gsub("%","",$3); print $3}')
          echo "total=${total}" >> "$GITHUB_OUTPUT"
        id: coverage
        working-directory: .

      - name: Frontend tests with coverage
        # Coverage summary is reported for CI visibility, but should not fail the
        # whole pipeline when front-end coverage is below threshold.
        continue-on-error: true
        run: |
          npx vitest run --coverage --coverage.reportsDirectory=coverage-js --coverage.reporter=lcov --coverage.reporter=json-summary || true
          js_total=0
          if [ -f coverage-js/coverage-summary.json ]; then
            js_total=$(node -e "const fs = require('node:fs'); const summary = JSON.parse(fs.readFileSync('coverage-js/coverage-summary.json', 'utf8')); process.stdout.write(String(summary.total.lines.pct));")
          fi
          echo "total=${js_total}" >> "$GITHUB_OUTPUT"
        id: js-coverage
        working-directory: .

      - name: Coverage Summary
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Overall Go coverage: **${{ steps.coverage.outputs.total }}%**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Overall JS coverage: **${{ steps.js-coverage.outputs.total }}%**" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Profile
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

      - name: Upload Coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: |
            coverage.out
            coverage-js/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload JS Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: coverage-js
